function fmtDate(s, showTime) {
  if (!s) return "-";
  var d = new Date(s);
  if (isNaN(d.getTime())) return String(s);
  var date = d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  if (!showTime) return date;
  if (!s.toString().includes(":")) return date;
  var h = d.getHours(), m = d.getMinutes();
  var hh = h < 10 ? "0"+h : ""+h;
  var mm = m < 10 ? "0"+m : ""+m;
  return date + " " + hh + mm;
}
function parseDate(s) { if (!s) return null; var d=new Date(s); return isNaN(d.getTime())?null:d; }
function parseToYMD(s) {
  if (!s) return null;
  s = String(s).trim();
  // Already YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  // M/D/YYYY or MM/DD/YYYY
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return m[3]+"-"+m[1].padStart(2,"0")+"-"+m[2].padStart(2,"0");
  return null;
}
function isOverdue(t) {
  if (!t.due_date || t.status==="Complete") return false;
  var d = parseToYMD(t.due_date);
  if (!d) return false;
  var today = new Date().toISOString().slice(0,10);
  return d < today;
}

function toRows(records, cols) {
  var out = [cols.slice()];
  for (var i=0;i<records.length;i++) {
    var r=records[i], row=[];
    for (var j=0;j<cols.length;j++) { row.push(r[cols[j]]!==undefined ? r[cols[j]] : ""); }
    out.push(row);
  }
  return out;
}
function fromRows(rows, cols) {
  if (!rows || rows.length<2) return [];
  var out=[];
  for (var i=1;i<rows.length;i++) {
    var obj={};
    for (var j=0;j<cols.length;j++) { obj[cols[j]]=rows[i][j]!==undefined?rows[i][j]:""; }
    if (obj.id) obj.id=parseInt(obj.id)||obj.id;
    out.push(obj);
  }
  return out;
}

async function apiGet(sheetId, range) {
  var token=getToken();
  var apikey=localStorage.getItem("icap_apikey");
  var url="https://sheets.googleapis.com/v4/spreadsheets/"+sheetId+"/values/"+encodeURIComponent(range);
  var r;
  if (token) {
    r=await fetch(url,{headers:{Authorization:"Bearer "+token}});
  } else if (apikey) {
    r=await fetch(url+"?key="+apikey);
  } else {
    throw new Error("Not authenticated - please sign in via Setup");
  }
  if (r.status===401) { localStorage.removeItem("icap_gtoken"); localStorage.removeItem("icap_gtoken_exp"); throw new Error("Session expired - please try again"); }
  if (!r.ok) throw new Error("Read failed: "+r.status);
  return r.json();
}
async function apiPut(sheetId, range, values) {
  var token=getToken();
  var url="https://sheets.googleapis.com/v4/spreadsheets/"+sheetId+"/values/"+encodeURIComponent(range)+"?valueInputOption=USER_ENTERED";
  var r=await fetch(url,{method:"PUT",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify({range:range,majorDimension:"ROWS",values:values})});
  if (r.status===401) { localStorage.removeItem("icap_gtoken"); localStorage.removeItem("icap_gtoken_exp"); throw new Error("Token expired - please click Connect Google in Setup, then try again."); }
  if (!r.ok) throw new Error("Write failed: "+r.status);
  return r.json();
}
async function apiClear(sheetId, range) {
  var token=getToken();
  if (!token) throw new Error("Not signed in to Google");
  var url="https://sheets.googleapis.com/v4/spreadsheets/"+sheetId+"/values/"+encodeURIComponent(range)+":clear";
  var r=await fetch(url,{method:"POST",headers:{Authorization:"Bearer "+token}});
  if (r.status===401) {
    localStorage.removeItem("icap_gtoken");
    localStorage.removeItem("icap_gtoken_exp");
    throw new Error("Google session expired. The sign-in window may have been blocked. Please allow popups for this site, then try again.");
  }
  if (!r.ok) {
    var body=""; try { body=await r.text(); } catch(e) {}
    throw new Error("Clear failed: "+r.status+" "+body.slice(0,100));
  }
}
async function ensureTabs(sheetId) {
  var token=getToken();
  var r=await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+sheetId,{headers:{Authorization:"Bearer "+token}});
  var meta=await r.json();
  var existing=(meta.sheets||[]).map(function(s){return s.properties.title;});
  var needed=["Tasks","Calendar","Members","BD","Leave","Taxes","Travel","Conferences"];
  var missing=needed.filter(function(t){return existing.indexOf(t)<0;});
  if (!missing.length) return;
  var reqs=missing.map(function(t){return {addSheet:{properties:{title:t}}};});
  await fetch("https://sheets.googleapis.com/v4/spreadsheets/"+sheetId+":batchUpdate",{method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify({requests:reqs})});
}

async function writeAll(sheetId, data) {
  var pairs=[
    ["Tasks",data.tasks,TASK_COLS],["Calendar",data.events,EVENT_COLS],
    ["Members",data.members,MEMBER_COLS],["BD",data.bd_opportunities,BD_COLS],
    ["Leave",data.leave,LEAVE_COLS],["Taxes",data.taxes,TAX_COLS],
    ["Travel",data.travel,TRAVEL_COLS],["Conferences",data.conferences,CONF_COLS]
  ];
  for (var i=0;i<pairs.length;i++) {
    var tab=pairs[i][0], recs=pairs[i][1]||[], cols=pairs[i][2];
    var rows=toRows(recs,cols);
    var endCol=String.fromCharCode(64+cols.length);
    await apiClear(sheetId,tab+"!A:Z");
    await apiPut(sheetId,tab+"!A1:"+endCol+(rows.length+10),rows);
  }
}
async function readAll(sheetId) {
  var pairs=[
    ["tasks","Tasks",TASK_COLS],["events","Calendar",EVENT_COLS],
    ["members","Members",MEMBER_COLS],["bd_opportunities","BD",BD_COLS],
    ["leave","Leave",LEAVE_COLS],["taxes","Taxes",TAX_COLS],
    ["travel","Travel",TRAVEL_COLS],["conferences","Conferences",CONF_COLS]
  ];
  var out={};
  for (var i=0;i<pairs.length;i++) {
    var key=pairs[i][0], tab=pairs[i][1], cols=pairs[i][2];
    try { var res=await apiGet(sheetId,tab+"!A:Z"); out[key]=fromRows(res.values||[],cols); }
    catch(e) { out[key]=[]; console.warn("Could not read tab "+tab+": "+e.message); }
  }
  return out;
}

function saveTokenFromHash(hash) {
  var p=new URLSearchParams(hash.replace(/^#/,""));
  var token=p.get("access_token");
  if (!token) return false;
  var exp=Date.now()+parseInt(p.get("expires_in")||"3600")*1000;
  localStorage.setItem(GTOKEN_KEY,token);
  localStorage.setItem(GTOKEN_EXP,exp.toString());
  return true;
}

function launchOAuth(clientId) {
  return new Promise(function(resolve,reject) {
    var redirectUri=window.location.origin+window.location.pathname;
    var params=new URLSearchParams({
      client_id:clientId,
      redirect_uri:redirectUri,
      response_type:"token",
      scope:"https://www.googleapis.com/auth/spreadsheets",
      prompt:"select_account"
    });
    var authUrl="https://accounts.google.com/o/oauth2/v2/auth?"+params.toString();
    var w=null;
    try { w=window.open(authUrl,"gauth","width=520,height=680,left=200,top=80"); } catch(e) {}
    if (w && !w.closed) {
      var done=false;
      var poll=setInterval(function() {
        try {
          if (w.closed) { clearInterval(poll); if (!done) reject(new Error("Window closed")); return; }
          var h=w.location.hash;
          if (h && h.indexOf("access_token")>=0) {
            clearInterval(poll); w.close();
            if (saveTokenFromHash(h)) { done=true; resolve(localStorage.getItem(GTOKEN_KEY)); }
            else reject(new Error("No token in response"));
          }
        } catch(e) {}
      },500);
      setTimeout(function(){clearInterval(poll);if(!done)reject(new Error("Timed out"));},180000);
    } else {
      reject(new Error("POPUP_BLOCKED"));
    }
  });
}

function setApiKey(key) {
  localStorage.setItem("icap_apikey", key);
  // Store as a never-expiring "token" for the sheets API key flow
  localStorage.setItem(GTOKEN_KEY, key);
  localStorage.setItem(GTOKEN_EXP, String(Date.now() + 365*24*60*60*1000));
}

  const [f,setF]=useState({title:"",notes:"",start:td+" 09:00",end:td+" 10:00",location:""});
  var upd=function(k,v){setF(function(p){var n=Object.assign({},p);n[k]=v;return n;});};
  return (
    <ModalWrap title="New Event" onClose={props.onClose} onSave={function(){props.onSave(f);}}>
      <FI label="Title"><FIn value={f.title} onChange={function(e){upd("title",e.target.value);}} /></FI>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FI label="Start"><FIn type="datetime-local" value={f.start.replace(" ","T")} onChange={function(e){upd("start",e.target.value.replace("T"," "));}} /></FI>
        <FI label="End"><FIn type="datetime-local" value={f.end.replace(" ","T")} onChange={function(e){upd("end",e.target.value.replace("T"," "));}} /></FI>
      </div>
      <FI label="Location"><FIn value={f.location} onChange={function(e){upd("location",e.target.value);}} /></FI>
      <FI label="Notes"><FTa value={f.notes} onChange={function(e){upd("notes",e.target.value);}} /></FI>
    </ModalWrap>
  );
}

        <FI label="Phone"><div style={{fontSize:13,color:"#c9d1d9",padding:"7px 0"}}>{m.phone||m.mobile||"-"}</div></FI>

        <FI label="Follow-up"><div style={{fontSize:13,color:m.follow_up?"#f59e0b":"#c9d1d9",padding:"7px 0"}}>{fmtDate(m.follow_up)||"-"}</div></FI>
        <FI label="Last Email"><div style={{fontSize:13,color:"#c9d1d9",padding:"7px 0"}}>{fmtDate(m.last_email)||"-"}</div></FI>

    </ModalWrap>

function SetupPanel(props) {
  const [clientId,setClientId]=useState(localStorage.getItem(CLIENT_ID_KEY)||"");
  const [sheetId,setSheetId]=useState(localStorage.getItem(SHEET_ID_KEY)||"");
  const [step,setStep]=useState(1);
  const [status,setStatus]=useState("");
  const [apiKey,setApiKey2]=useState(localStorage.getItem("icap_apikey")||"");
  var connect=async function() {
    if (!clientId.trim()||!sheetId.trim()) { alert("Please fill in both fields."); return; }
    localStorage.setItem(CLIENT_ID_KEY,clientId.trim());
    localStorage.setItem(SHEET_ID_KEY,sheetId.trim());
    if (apiKey.trim()) {
      setApiKey(apiKey.trim());
      setStatus("API key saved! Loading...");
      setTimeout(function(){props.onDone();},800);
      return;
    }
    setStatus("Opening Google sign-in...");
    try {
      await launchOAuth(clientId.trim());
      setStatus("Signed in! Loading...");
      setTimeout(function(){props.onDone();},800);
    } catch(e) {
      if (e.message==="POPUP_BLOCKED") {
        setStatus("Popup blocked. Please allow popups for stayloric-cap.github.io, then try again. Or use an API key instead (see Step 2).");
      } else {
        setStatus("Error: "+e.message);
      }
    }
  };
  return (
    <div style={{background:"#0d1117",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"Inter,sans-serif"}}>
      <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:14,padding:32,maxWidth:540,width:"100%"}}>
        <div style={{fontWeight:700,fontSize:18,color:"#f0f6fc",marginBottom:6}}>IC-CAP Command Center</div>
        <div style={{fontSize:12,color:"#8b949e",marginBottom:24}}>Google Sheets sync setup</div>
        <div style={{display:"flex",gap:0,marginBottom:24,borderBottom:"1px solid #30363d"}}>
          {[1,2,3].map(function(n){
            return <button key={n} onClick={function(){setStep(n);}} style={{flex:1,padding:"8px",background:"none",border:"none",borderBottom:"2px solid "+(step===n?"#58a6ff":"transparent"),color:step===n?"#58a6ff":"#8b949e",cursor:"pointer",fontSize:13,fontWeight:step===n?600:400}}>Step {n}</button>;
          })}
        </div>
        {step===1 && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{fontSize:13,color:"#c9d1d9",lineHeight:1.8}}>
              <div style={{fontWeight:600,color:"#f0f6fc",marginBottom:8}}>Create a Google OAuth Client:</div>
              <div>1. Go to console.cloud.google.com and create a project</div>
              <div>2. Enable the Google Sheets API</div>
              <div>3. OAuth consent screen - External - fill app name</div>
              <div>4. Credentials - Create - OAuth 2.0 Client ID - Web app</div>
              <div>5. Add https://claude.ai as Authorized JavaScript Origin</div>
              <div>6. Copy your Client ID below</div>
            </div>
            <FI label="Google OAuth Client ID"><FIn value={clientId} onChange={function(e){setClientId(e.target.value);}} placeholder="123456789-abc.apps.googleusercontent.com" /></FI>
            <Btn onClick={function(){setStep(2);}} style={{background:"#238636",border:"1px solid #2ea043",color:"#f0f6fc",fontWeight:600}}>Next</Btn>
          </div>
        )}
        {step===2 && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{fontSize:13,color:"#c9d1d9",lineHeight:1.8}}>
              <div style={{fontWeight:600,color:"#f0f6fc",marginBottom:8}}>Create your Google Sheet:</div>
              <div>1. Go to sheets.google.com and create a blank spreadsheet</div>
              <div>2. Name it IC-CAP Command Center</div>
              <div>3. Copy the Sheet ID from the URL (between /d/ and /edit)</div>
            </div>
            <FI label="Google Sheet ID"><FIn value={sheetId} onChange={function(e){setSheetId(e.target.value);}} placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" /></FI>
            <div style={{background:"#21262d",borderRadius:8,padding:"12px 14px",fontSize:12,color:"#8b949e",lineHeight:1.8}}>
              <div style={{fontWeight:600,color:"#f59e0b",marginBottom:6}}>Having trouble with Google sign-in? Use an API key instead:</div>
              <div>1. In Google Cloud Console go to APIs and Services then Credentials</div>
              <div>2. Click Create Credentials then API key</div>
              <div>3. Copy and paste it below (leave blank to use OAuth sign-in)</div>
              <div style={{marginTop:8}}><FIn value={apiKey} onChange={function(e){setApiKey2(e.target.value);}} placeholder="AIza... (optional, paste API key here)" /></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={function(){setStep(1);}}>Back</Btn>
              <Btn onClick={function(){setStep(3);}} style={{flex:1,background:"#238636",border:"1px solid #2ea043",color:"#f0f6fc",fontWeight:600}}>Next</Btn>
            </div>
          </div>
        )}
        {step===3 && (
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{fontSize:13,color:"#c9d1d9",lineHeight:1.8}}>Click Connect to sign in with Google. On first connect your existing IC-CAP data will be written to the Sheet automatically and will sync across all your devices.</div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={function(){setStep(2);}}>Back</Btn>
              <Btn onClick={connect} style={{flex:1,background:"#1f6feb",border:"1px solid #388bfd",color:"#f0f6fc",fontWeight:700,fontSize:14}}>Connect and Sign In</Btn>
            </div>
            {status && <div style={{padding:"8px 12px",background:"#21262d",borderRadius:8,fontSize:13,color:status.indexOf("Error")>=0?"#ef4444":"#22c55e"}}>{status}</div>}
          </div>
        )}
      </div>
    </div>
  );
}

function SyncPanel(props) {
  const [info,setInfo]=useState(null);
  const [reStatus,setReStatus]=useState("");
  var check=function() {
    var c=cfg();
    var exp=localStorage.getItem(GTOKEN_EXP);
    var ok=!!(exp&&Date.now()<parseInt(exp)-60000);
    setInfo({cid:c.clientId?(c.clientId.slice(0,35)+"..."):"NOT SET",sid:c.sheetId||"NOT SET",ok:ok,exp:exp?new Date(parseInt(exp)).toLocaleTimeString():"none"});
  };
  var reAuth=async function() {
    var c=cfg();
    if (!c.clientId) { setReStatus("No Client ID. Click Setup."); return; }
    setReStatus("Opening sign-in...");
    try { await launchOAuth(c.clientId); setReStatus("Signed in!"); check(); }
    catch(e) { setReStatus("Error: "+e.message); }
  };
  return (
    <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:info?10:0}}>
        <span style={{fontSize:12,color:"#8b949e",fontWeight:600,flex:1}}>Google Sheets Sync</span>
        <Btn onClick={check}>Check Status</Btn>
        <Btn onClick={props.onPull} style={{color:"#58a6ff",border:"1px solid rgba(88,166,255,0.3)",background:"rgba(88,166,255,0.1)"}}>Pull from Sheet</Btn>
        <Btn onClick={props.onPush} style={{color:"#2ea043",border:"1px solid #2ea04366",background:"rgba(35,134,54,0.15)",fontWeight:600}}>Force Push All Data</Btn>
      </div>
      {info && (
        <div style={{fontSize:11,display:"flex",flexDirection:"column",gap:5}}>
          <div style={{display:"flex",gap:8}}><span style={{color:"#8b949e",width:90,flexShrink:0}}>Client ID:</span><span style={{color:info.cid==="NOT SET"?"#ef4444":"#22c55e"}}>{info.cid}</span></div>
          <div style={{display:"flex",gap:8}}><span style={{color:"#8b949e",width:90,flexShrink:0}}>Sheet ID:</span><span style={{color:info.sid==="NOT SET"?"#ef4444":"#22c55e"}}>{info.sid}</span></div>
          <div style={{display:"flex",gap:8}}><span style={{color:"#8b949e",width:90,flexShrink:0}}>Auth Token:</span><span style={{color:info.ok?"#22c55e":"#ef4444"}}>{info.ok?"Valid (expires "+info.exp+")":"EXPIRED or missing"}</span></div>
          {!info.ok && (
            <div style={{marginTop:4}}>
              <Btn onClick={reAuth} style={{background:"#1f6feb",border:"1px solid #388bfd",color:"#fff",fontWeight:600}}>Re-authenticate with Google</Btn>
              {reStatus && <div style={{marginTop:4,fontSize:11,color:reStatus.indexOf("Error")>=0?"#ef4444":"#22c55e"}}>{reStatus}</div>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [data,setData]=useState(null);
  const [tab,setTab]=useState("tasks");
  const [loading,setLoading]=useState(true);
  const [loadMsg,setLoadMsg]=useState("Loading...");
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState("");
  const [aiInput,setAiInput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [aiHistory,setAiHistory]=useState([]);
  const [gmailLoading,setGmailLoading]=useState(false);
  const [filter,setFilter]=useState({status:"active",priority:"all",search:"",category:"all"});
  const [sort,setSort]=useState({field:"due_date",dir:"asc"});
  const [editItem,setEditItem]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [showSetup,setShowSetup]=useState(false);
  const [expandedTask,setExpandedTask]=useState(null);
  const [showImport,setShowImport]=useState(false);
  const [importText,setImportText]=useState("");
  const [showExportText,setShowExportText]=useState(false);
  const [syncCode,setSyncCode]=useState("");

  var flash=function(msg,ms) { setSyncMsg(msg); if(ms) setTimeout(function(){setSyncMsg("");},ms); };

  var ensureAuth=async function(forceNew) {
    if (!forceNew && tokenValid()) return true;
    var c=cfg();
    if (!c.clientId) return false;
    try { await launchOAuth(c.clientId); return true; }
    catch(e) { flash("Auth failed: "+e.message,5000); return false; }
  };

  useEffect(function() {
    (async function() {
      // Check if we just returned from a redirect OAuth flow
      var h=window.location.hash;
      if (h && h.indexOf("access_token")>=0) {
        saveTokenFromHash(h);
        history.replaceState(null,"",window.location.pathname);
        localStorage.removeItem("icap_oauth_pending");
      }
      var c=cfg();
      // Migrate from old storage keys or seed on first run
      if (!localStorage.getItem("icap_v4")) {
        var oldKeys=["icap_data_local","icap_data_v3","icap_data_v2","icap_data"];
        var migrated=false;
        for (var oi=0;oi<oldKeys.length;oi++) {
          var oldVal=localStorage.getItem(oldKeys[oi]);
          if (oldVal) { localStorage.setItem("icap_v4",oldVal); migrated=true; break; }
        }
        if (!migrated) { localStorage.setItem("icap_v4",JSON.stringify(SEED_DATA)); }
      }
      // Migrate from old keys
      if (!localStorage.getItem("icap_v4")) {
        var oldKeys=["icap_data_local","icap_data_v3","icap_data_v2","icap_data"];
        for (var oi=0;oi<oldKeys.length;oi++) {
          var oldVal=localStorage.getItem(oldKeys[oi]);
          if (oldVal) { localStorage.setItem("icap_v4",oldVal); break; }
        }
      }
      // Migrate from old keys
      if (!localStorage.getItem("icap_v4")) {
        var oldKeys=["icap_data_local","icap_data_v3","icap_data_v2","icap_data"];
        for (var oi=0;oi<oldKeys.length;oi++) {
          var oldVal=localStorage.getItem(oldKeys[oi]);
          if (oldVal) { localStorage.setItem("icap_v4",oldVal); break; }
        }
      }
      var local=localStorage.getItem("icap_v4");
      var loaded=local?JSON.parse(local):null;
      // Always re-seed from embedded data if local is empty or has no tasks
      if (!loaded||!loaded.tasks||!loaded.tasks.length) {
        loaded=SEED_DATA;
        localStorage.setItem("icap_v4",JSON.stringify(loaded));
      }
      setData(loaded);
      setLoading(false);
    })();
  },[]);

  var save=useCallback(async function(updates) {
    // Stamp last_update on any modified tasks
    var today=new Date().toISOString().slice(0,10);
    if (updates.tasks) {
      updates = Object.assign({}, updates, {
        tasks: updates.tasks.map(function(t) {
          return t.last_update ? t : Object.assign({}, t, {last_update: today});
        })
      });
    }
    var nd=Object.assign({},data,updates);
    setData(nd);
    localStorage.setItem("icap_v4",JSON.stringify(nd));
    var c=cfg();
    if (!c.sheetId) return;
    setSyncing(true);
    try {
      var ok=await ensureAuth();
      if (ok) { await writeAll(c.sheetId,nd); flash("Synced",2000); }
      else { flash("Not signed in to Google - saved locally only",4000); }
    } catch(e) { flash("Sync failed: "+e.message,5000); }
    setSyncing(false);
  },[data]);

  var pullSheet=async function() {
    var c=cfg();
    if (!c.sheetId) { flash("No Sheet configured - data is local only",3000); return; }
    setSyncing(true); flash("Refreshing from Sheet...",0);
    try {
      var ok=await ensureAuth(true);
      if (!ok) throw new Error("Not signed in to Google");
      var sd=await readAll(c.sheetId);
      // Only update if sheet actually has data - never overwrite with empty
      if (!sd.tasks || sd.tasks.length===0) {
        flash("Sheet is empty - keeping local data. Use Force Push to populate it.",5000);
        setSyncing(false); return;
      }
      setData(sd);
      localStorage.setItem("icap_v4",JSON.stringify(sd));
      flash("Refreshed from Sheet: "+sd.tasks.length+" tasks",3000);
    } catch(e) { flash("Refresh failed: "+e.message+". Keeping local data.",6000); }
    setSyncing(false);
  };

  var pushSheet=async function() {
    var c=cfg();
    if (!c.sheetId) { alert("No Sheet ID configured. Click Setup."); return; }
    if (!c.clientId) { alert("No Client ID configured. Click Setup."); return; }
    setSyncing(true);
    var doPush=async function() {
      // Always force a fresh token before pushing
      localStorage.removeItem("icap_gtoken");
      localStorage.removeItem("icap_gtoken_exp");
      flash("Signing in to Google...",0);
      var ok=await ensureAuth(true);
      if (!ok) throw new Error("Google sign-in failed or was cancelled");
      flash("Ensuring sheet tabs exist...",0);
      await ensureTabs(c.sheetId);
      flash("Writing data...",0);
      await writeAll(c.sheetId,data);
    };
    try {
      await doPush();
      var counts="Tasks:"+((data.tasks||[]).length)+" Members:"+((data.members||[]).length)+" BD:"+((data.bd_opportunities||[]).length);
      flash("Done! "+counts,5000);
    } catch(e) {
      flash("Push failed: "+e.message,8000);
    }
    setSyncing(false);
  };

  var tasks=(data&&data.tasks)||[];
  var events=(data&&data.events)||[];
  var members=(data&&data.members)||[];
  var bd=(data&&data.bd_opportunities)||[];
  var leave=(data&&data.leave)||[];
  var taxes=(data&&data.taxes)||[];
  var travel=(data&&data.travel)||[];
  var confs=(data&&data.conferences)||[];

  var stats=useMemo(function() {
    return {
      total:tasks.length,
      open:tasks.filter(function(t){return t.status==="Not Started";}).length,
      inprog:tasks.filter(function(t){return t.status==="In Progress";}).length,
      done:tasks.filter(function(t){return t.status==="Complete";}).length,
      overdue:tasks.filter(function(t){return isOverdue(t);}).length,
      high:tasks.filter(function(t){return t.priority==="High"&&t.status!=="Complete";}).length
    };
  },[tasks]);

  var cats=useMemo(function() {
    var s=new Set();
    tasks.forEach(function(t){if(t.category)s.add(t.category.split("/")[0].trim());});
    return ["all"].concat(Array.from(s).sort());
  },[tasks]);

  var filtered=useMemo(function() {
    var PO={High:0,Medium:1,Low:2};
    var out=tasks.filter(function(t) {
      if (t.status==="Complete") return false;
      if (filter.status!=="active"&&filter.status!=="all"&&t.status!==filter.status) return false;
      if (filter.priority!=="all"&&t.priority!==filter.priority) return false;
      if (filter.category!=="all"&&!(t.category||"").startsWith(filter.category)) return false;
      if (filter.search) { var q=filter.search.toLowerCase(); if ((t.title||"").toLowerCase().indexOf(q)<0&&(t.category||"").toLowerCase().indexOf(q)<0) return false; }
      return true;
    });
    return out.sort(function(a,b) {
      var av,bv;
      if (sort.field==="due_date") { av=(parseDate(a.due_date)||{getTime:function(){return 9e15;}}).getTime(); bv=(parseDate(b.due_date)||{getTime:function(){return 9e15;}}).getTime(); }
      else if (sort.field==="priority") { av=PO[a.priority]!==undefined?PO[a.priority]:1; bv=PO[b.priority]!==undefined?PO[b.priority]:1; }
      else if (sort.field==="title") { av=(a.title||"").toLowerCase(); bv=(b.title||"").toLowerCase(); }
      else { av=a.last_update||""; bv=b.last_update||""; }
      if (av<bv) return sort.dir==="asc"?-1:1;
      if (av>bv) return sort.dir==="asc"?1:-1;
      return 0;
    });
  },[tasks,filter,sort]);

  var toggleSort=function(f) { setSort(function(s){return {field:f,dir:s.field===f&&s.dir==="asc"?"desc":"asc"};}); };

  var runAI=async function() {
    if (!aiInput.trim()) return;
    var msg=aiInput.trim(); setAiInput(""); setAiLoading(true);
    setAiHistory(function(h){return h.concat([{role:"user",text:msg}]);});
    var snap=JSON.stringify({tasks:tasks.filter(function(t){return t.status!=="Complete";}).slice(0,80),events:events.slice(0,30),members:members,bd:bd.slice(0,30)});
    var today=new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    var sys="You manage IC-CAP database. Today: "+today+". Data: "+snap+". For VIEW requests answer conversationally. For changes respond ONLY with valid JSON like this example: {\"action\":\"update_db\",\"changes\":{\"tasks\":[]},\"message\":\"did the thing\"}";
    try {
      var reply=await callClaude(sys,msg);
      var parsed=null;
      try { parsed=JSON.parse(reply.trim()); } catch(e) {}
      if (parsed&&parsed.action==="update_db") {
        var upd={};
        if (parsed.changes&&parsed.changes.tasks) upd.tasks=parsed.changes.tasks;
        if (parsed.changes&&parsed.changes.events) upd.events=parsed.changes.events;
        if (Object.keys(upd).length) await save(upd);
        setAiHistory(function(h){return h.concat([{role:"assistant",text:"Done: "+parsed.message}]);});
      } else {
        setAiHistory(function(h){return h.concat([{role:"assistant",text:reply}]);});
      }
    } catch(e) { setAiHistory(function(h){return h.concat([{role:"assistant",text:"Error: "+e.message}]);}); }
    setAiLoading(false);
  };

  var runGmail=async function() {
    setGmailLoading(true);
    setAiHistory(function(h){return h.concat([{role:"user",text:"Scanning Gmail for tasks..."}]);});
    var maxId=Math.max.apply(null,tasks.map(function(t){return parseInt(t.id)||0;}).concat([0]));
    try {
      var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,system:"Extract actionable tasks from Gmail for IC-CAP. Max existing task ID: "+maxId+". Return ONLY valid JSON: {\"action\":\"update_db\",\"changes\":{\"tasks\":[]},\"message\":\"summary\"}",messages:[{role:"user",content:"Check my recent Gmail for actionable tasks. Add them to my task list."}],mcp_servers:[{type:"url",url:"https://gmail.mcp.claude.com/mcp",name:"gmail-mcp"}]})});
      var d=await r.json();
      var text=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n")||"";
      var parsed=null;
      try { parsed=JSON.parse(text.trim()); } catch(e) {}
      if (parsed&&parsed.action==="update_db"&&parsed.changes&&parsed.changes.tasks) {
        await save({tasks:parsed.changes.tasks});
        setAiHistory(function(h){return h.concat([{role:"assistant",text:parsed.message}]);});
      } else {
        setAiHistory(function(h){return h.concat([{role:"assistant",text:text||"Gmail scan complete."}]);});
      }
    } catch(e) { setAiHistory(function(h){return h.concat([{role:"assistant",text:"Gmail error: "+e.message}]);}); }
    setGmailLoading(false);
  };

  if (loading) return (
    <div style={{background:"#0d1117",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,fontFamily:"Inter,sans-serif"}}>
      <div style={{fontSize:14,color:"#c9d1d9"}}>{loadMsg}</div>
    </div>
  );

  if (showSetup) return <SetupPanel onDone={function(){setShowSetup(false);}} />;

  return (
    <div style={{fontFamily:"Inter,sans-serif",background:"#0d1117",minHeight:"100vh",color:"#c9d1d9",display:"flex",flexDirection:"column"}}>
      <div style={{background:"#161b22",borderBottom:"1px solid #30363d",padding:"10px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{flexShrink:0}}>
          <div style={{fontWeight:700,fontSize:14,color:"#f0f6fc"}}>IC-CAP Command Center</div>
          <div style={{fontSize:10,color:"#8b949e"}}>{stats.open} open  {stats.inprog} in progress  {stats.overdue} overdue</div>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",flex:1,justifyContent:"center"}}>
          {TABS.map(function(t){
            return <button key={t} onClick={function(){setTab(t);}} style={{padding:"5px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:500,background:tab===t?"#21262d":"transparent",color:tab===t?"#f0f6fc":"#8b949e"}}>{LABELS[t]}</button>;
          })}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
          {syncMsg && <span style={{fontSize:11,color:syncMsg.indexOf("failed")>=0||syncMsg.indexOf("Error")>=0?"#f59e0b":"#22c55e"}}>{syncMsg}</span>}
          {syncing && <span style={{fontSize:11,color:"#8b949e"}}>syncing...</span>}

          <Btn onClick={pullSheet}>Refresh</Btn>
          <Btn onClick={function(){setShowSetup(true);}}>Setup</Btn>
        </div>
      </div>

      <div style={{flex:1,overflow:"auto",padding:20}}>

        {tab==="tasks" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:20}}>
              {[{l:"Total",v:stats.total,c:"#58a6ff"},{l:"Open",v:stats.open,c:"#8b949e"},{l:"In Progress",v:stats.inprog,c:"#3b82f6"},{l:"Complete",v:stats.done,c:"#22c55e"},{l:"Overdue",v:stats.overdue,c:"#ef4444"},{l:"High Pri",v:stats.high,c:"#f97316"}].map(function(s){
                return <div key={s.l} style={{background:"#161b22",border:"1px solid "+s.c+"33",borderRadius:10,padding:"12px 14px"}}><div style={{fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div><div style={{fontSize:11,color:"#8b949e",marginTop:2}}>{s.l}</div></div>;
              })}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              <input value={filter.search} onChange={function(e){setFilter(function(f){return Object.assign({},f,{search:e.target.value});});}} placeholder="Search..." style={{background:"#21262d",border:"1px solid #30363d",borderRadius:8,padding:"6px 12px",color:"#c9d1d9",fontSize:13,width:180,outline:"none"}} />
              <select value={filter.status} onChange={function(e){setFilter(function(f){return Object.assign({},f,{status:e.target.value});});}} style={{background:"#21262d",border:"1px solid #30363d",color:"#c9d1d9",borderRadius:8,padding:"6px 10px",fontSize:13}}>
                <option value="active">All Active</option>
                <option value="Not Started">Not Started</option>
                <option value="In Progress">In Progress</option>
                <option value="Blocked">Blocked</option>
              </select>
              <select value={filter.priority} onChange={function(e){setFilter(function(f){return Object.assign({},f,{priority:e.target.value});});}} style={{background:"#21262d",border:"1px solid #30363d",color:"#c9d1d9",borderRadius:8,padding:"6px 10px",fontSize:13}}>
                <option value="all">All Priorities</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
              <select value={filter.category} onChange={function(e){setFilter(function(f){return Object.assign({},f,{category:e.target.value});});}} style={{background:"#21262d",border:"1px solid #30363d",color:"#c9d1d9",borderRadius:8,padding:"6px 10px",fontSize:13,maxWidth:170}}>
                {cats.slice(0,50).map(function(c){return <option key={c} value={c}>{c==="all"?"All Categories":c}</option>;})}
              </select>
              <Btn onClick={function(){setShowAdd(true);}} style={{marginLeft:"auto",background:"#238636",border:"1px solid #2ea043",color:"#f0f6fc",fontWeight:600}}>+ Add Task</Btn>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#8b949e",fontWeight:500}}>Sort:</span>
              {[["due_date","Due Date"],["priority","Priority"],["last_update","Last Updated"],["title","Title"]].map(function(p){
                var active=sort.field===p[0];
                return <button key={p[0]} onClick={function(){toggleSort(p[0]);}} style={{padding:"4px 10px",borderRadius:6,border:"1px solid "+(active?"#58a6ff66":"#30363d"),background:active?"rgba(88,166,255,0.12)":"transparent",color:active?"#58a6ff":"#8b949e",fontSize:12,cursor:"pointer",fontWeight:active?600:400}}>{p[1]}{active?(sort.dir==="asc"?" +": " -"):""}</button>;
              })}
            </div>
            <div style={{fontSize:12,color:"#8b949e",marginBottom:8}}>{filtered.length} tasks</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {filtered.slice(0,200).map(function(task) {
                var over=isOverdue(task);
                var expanded=expandedTask===task.id;
                return (
                  <div key={task.id} style={{background:"#161b22",borderRadius:8,border:"1px solid "+(over?"#ef444433":expanded?"#58a6ff55":"#30363d"),overflow:"hidden"}}>
                    <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={function(){setExpandedTask(expanded?null:task.id);}}>
                      <div style={{width:3,height:32,borderRadius:2,background:P_COLOR[task.priority]||"#8b949e",flexShrink:0}} />
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:500,color:"#f0f6fc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {task.title} <span style={{fontWeight:400,color:"#8b949e",fontSize:11}}>({task.id})</span>
                        </div>
                        <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap",alignItems:"center"}}>
                          {task.category && <span style={{fontSize:11,color:"#58a6ff",background:"rgba(88,166,255,0.1)",padding:"1px 7px",borderRadius:10}}>{task.category.split("/")[0].trim()}</span>}
                          {task.owner && <span style={{fontSize:11,color:"#8b949e"}}>{task.owner}</span>}
                          <span style={{fontSize:11,color:over?"#ef4444":"#8b949e"}}>{over?"OVERDUE  ":""}Due {fmtDate(task.due_date,true)}</span>
                        </div>
                      </div>
                      <select value={task.status} onChange={function(e){e.stopPropagation();var s=e.target.value;save({tasks:tasks.map(function(t){return t.id===task.id?Object.assign({},t,{status:s}):t;})});}} onClick={function(e){e.stopPropagation();}} style={{background:"#21262d",border:"1px solid #30363d",color:S_COLOR[task.status]||"#c9d1d9",borderRadius:6,padding:"3px 7px",fontSize:11,cursor:"pointer"}}>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Complete">Complete</option>
                        <option value="Blocked">Blocked</option>
                      </select>
                      <button title="Mark Complete" onClick={function(e){e.stopPropagation();save({tasks:tasks.map(function(t){return t.id===task.id?Object.assign({},t,{status:"Complete"}):t;})});}} style={{background:"rgba(34,197,94,0.15)",border:"1px solid rgba(34,197,94,0.4)",color:"#22c55e",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:14,fontWeight:700}}>&#10003;</button>
                      <Btn onClick={function(e){e.stopPropagation();setEditItem({type:"task",item:task});}}>Edit</Btn>
                      <span style={{color:"#8b949e",fontSize:12,flexShrink:0}}>{expanded?"^":"v"}</span>
                    </div>
                    {expanded && (
                      <div style={{padding:"10px 14px 14px 14px",borderTop:"1px solid #21262d",display:"flex",flexDirection:"column",gap:10}}>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                          <div><div style={{fontSize:10,color:"#8b949e",marginBottom:3,fontWeight:600}}>ID</div><span style={{fontSize:12,color:"#8b949e"}}>#{task.id}</span></div>
                          <div><div style={{fontSize:10,color:"#8b949e",marginBottom:3,fontWeight:600}}>PRIORITY</div><span style={{fontSize:12,color:P_COLOR[task.priority]||"#8b949e",fontWeight:600}}>{task.priority||"-"}</span></div>
                          <div><div style={{fontSize:10,color:"#8b949e",marginBottom:3,fontWeight:600}}>STATUS</div><span style={{fontSize:12,color:S_COLOR[task.status]||"#c9d1d9"}}>{task.status||"-"}</span></div>
                          <div><div style={{fontSize:10,color:"#8b949e",marginBottom:3,fontWeight:600}}>LAST UPDATE</div><span style={{fontSize:12,color:"#c9d1d9"}}>{task.last_update||"-"}</span></div>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                          <div><div style={{fontSize:10,color:"#8b949e",marginBottom:3,fontWeight:600}}>CATEGORY</div><span style={{fontSize:12,color:"#58a6ff"}}>{task.category||"-"}</span></div>
                          <div><div style={{fontSize:10,color:"#8b949e",marginBottom:3,fontWeight:600}}>OWNER</div><span style={{fontSize:12,color:"#c9d1d9"}}>{task.owner||"-"}</span></div>
                        </div>
                        <div><div style={{fontSize:10,color:"#8b949e",marginBottom:4,fontWeight:600}}>NOTES</div><div style={{fontSize:12,color:"#c9d1d9",lineHeight:1.6,background:"#0d1117",padding:"8px 10px",borderRadius:6,whiteSpace:"pre-wrap",minHeight:28}}>{task.notes||"-"}</div></div>
                        <div><div style={{fontSize:10,color:"#8b949e",marginBottom:4,fontWeight:600}}>NEXT ACTION</div><div style={{fontSize:12,color:"#58a6ff",lineHeight:1.6,background:"rgba(88,166,255,0.05)",padding:"8px 10px",borderRadius:6,whiteSpace:"pre-wrap",minHeight:28}}>{task.next_action||"-"}</div></div>
                        <div><div style={{fontSize:10,color:"#8b949e",marginBottom:4,fontWeight:600}}>LINK</div>{task.link?<a href={task.link} target="_blank" rel="noreferrer" style={{fontSize:12,color:"#58a6ff"}}>{task.link}</a>:<span style={{fontSize:12,color:"#8b949e"}}>-</span>}</div>
                      </div>
                    )}
                  </div>
                );
              })}
              {filtered.length===0 && <Empty msg="No tasks match your filters" />}
            </div>
          </div>
        )}

        {tab==="calendar" && (
          <div>
            <SecHead title="Calendar" count={events.length} onAdd={function(){setShowAdd(true);}} addLabel="+ Event" />
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {events.filter(function(e){return (e.start||"")>="2026";}).sort(function(a,b){return (a.start||"").localeCompare(b.start||"");}).slice(0,100).map(function(ev) {
                var dt=new Date(ev.start);
                return (
                  <div key={ev.id} style={{background:"#161b22",borderRadius:8,padding:"10px 14px",display:"flex",gap:12,border:"1px solid #30363d",alignItems:"center"}}>
                    <div style={{textAlign:"center",minWidth:42,background:"rgba(88,166,255,0.1)",borderRadius:7,padding:"5px 8px",flexShrink:0}}>
                      <div style={{fontSize:16,fontWeight:700,color:"#58a6ff",lineHeight:1}}>{dt.getDate()}</div>
                      <div style={{fontSize:10,color:"#8b949e"}}>{dt.toLocaleString("en-US",{month:"short"})}</div>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,color:"#f0f6fc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
                      <div style={{fontSize:11,color:"#8b949e",marginTop:2}}>{(ev.start||"").slice(11,16)||"All day"}{ev.end?"  "+ev.end.slice(11,16):""}{ev.location?"  "+ev.location:""}</div>
                    </div>
                    <button onClick={function(){save({events:events.filter(function(e){return e.id!==ev.id;})});}} style={{background:"none",border:"none",color:"#6e7681",cursor:"pointer",fontSize:14,flexShrink:0}}>X</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="members" && (
          <div>
            <SecHead title="Team Members" count={members.length} />
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
              {members.map(function(m) {
                return (
                  <div key={m.id} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"14px 16px",cursor:"pointer"}} onClick={function(){setEditItem({type:"member",item:m});}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div><div style={{fontWeight:600,fontSize:14,color:"#f0f6fc"}}>{m.first_name} {m.last_name}</div><div style={{fontSize:12,color:"#58a6ff",marginTop:2}}>{m.email}</div></div>
                      {m.follow_up && <span style={{fontSize:11,background:"rgba(245,158,11,0.2)",color:"#f59e0b",padding:"2px 8px",borderRadius:20}}>Follow-up: {fmtDate(m.follow_up)}</span>}
                    </div>
                    {m.last_email && <div style={{fontSize:12,color:"#8b949e",marginTop:6}}>Last email: {fmtDate(m.last_email)}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="bd" && (
          <div>
            <SecHead title="BD Opportunities" count={bd.length} />
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {bd.map(function(op) {
                return (
                  <div key={op.id} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"12px 16px",display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13,color:"#f0f6fc"}}>{op.title}</div>
                      <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
                        {op.customer && <Chip text={op.customer} color="#58a6ff" />}
                        {op.stage && <Chip text={op.stage} color="#a371f7" />}
                        {op.contract_size && <Chip text={op.contract_size} color="#f59e0b" />}
                      </div>
                      {op.next_step && <div style={{fontSize:12,color:"#8b949e",marginTop:6}}>{(op.next_step||"").slice(0,150)}</div>}
                    </div>
                    {op.owner && <div style={{fontSize:11,color:"#8b949e",whiteSpace:"nowrap"}}>{op.owner}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="leave" && (
          <div>
            <SecHead title="Leave Schedule" count={leave.length} />
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {leave.slice().sort(function(a,b){return (a.start||"").localeCompare(b.start||"");}).map(function(l) {
                return (
                  <div key={l.id} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"12px 16px",display:"flex",gap:12,alignItems:"center"}}>
                    <div style={{minWidth:80,textAlign:"center",background:"rgba(88,166,255,0.1)",borderRadius:8,padding:"6px 10px"}}>
                      <div style={{fontSize:11,color:"#58a6ff",fontWeight:600}}>{l.type}</div>
                      <div style={{fontSize:10,color:"#8b949e",marginTop:2}}>{fmtDate(l.start)}</div>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:500,fontSize:13,color:"#f0f6fc"}}>{l.member}</div>
                      <div style={{fontSize:12,color:"#8b949e"}}>to {fmtDate(l.end)}  {l.status}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="taxes" && (
          <div>
            <SecHead title="Tax Schedule" count={taxes.length} />
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {taxes.slice().sort(function(a,b){return String(a.due_date).localeCompare(String(b.due_date));}).map(function(t) {
                return (
                  <div key={t.id} style={{background:"#161b22",border:"1px solid "+(t.paid_date?"#22c55e33":"#ef444433"),borderRadius:10,padding:"12px 16px",display:"flex",gap:16,alignItems:"center"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13,color:"#f0f6fc"}}>{t.tax_type}</div>
                      <div style={{fontSize:12,color:"#8b949e",marginTop:4}}>Due: {fmtDate(t.due_date)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:700,fontSize:15,color:t.paid_date?"#22c55e":"#ef4444"}}>${(parseFloat(t.amount_due)||0).toLocaleString("en-US",{minimumFractionDigits:2})}</div>
                      <div style={{fontSize:11,color:"#8b949e"}}>{t.paid_date?"Paid "+fmtDate(t.paid_date):"UNPAID"}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="travel" && (
          <div>
            <SecHead title="Travel and Expenses" count={travel.length} />
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {travel.map(function(t) {
                return (
                  <div key={t.id} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"12px 16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13,color:"#f0f6fc"}}>{t.member}  {t.location}</div>
                        <div style={{fontSize:12,color:"#8b949e",marginTop:3}}>{t.contract}  {fmtDate(t.start)} to {fmtDate(t.end)}</div>
                      </div>
                      {t.expense_amount && <div style={{fontWeight:700,fontSize:13,color:"#58a6ff"}}>${parseFloat(t.expense_amount).toLocaleString()}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="conferences" && (
          <div>
            <SecHead title="Conferences" count={confs.length} />
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {confs.map(function(c) {
                return (
                  <div key={c.id} style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"16px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:14,color:"#f0f6fc"}}>{c.name}</div>
                        <div style={{fontSize:12,color:"#8b949e",marginTop:4}}>{c.location}  {fmtDate(c.start)} to {fmtDate(c.end)}</div>
                      </div>
                      <Chip text={c.status||"TBD"} color="#a371f7" />
                    </div>
                    {c.notes && <div style={{fontSize:12,color:"#8b949e",marginTop:10,borderTop:"1px solid #21262d",paddingTop:8,lineHeight:1.6}}>{c.notes}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="ai" && (
          <div style={{maxWidth:720}}>
            <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:12,color:"#8b949e",fontWeight:600,marginBottom:12}}>Export / Import Data</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <button onClick={function(){
                  var json=JSON.stringify(data,null,2);
                  var encoded=btoa(unescape(encodeURIComponent(json)));
                  var uri="data:application/json;base64,"+encoded;
                  var a=document.createElement("a");
                  a.href=uri;
                  a.download="icap_backup_"+new Date().toISOString().slice(0,10)+".json";
                  document.body.appendChild(a);
                  a.click();
                  document.body.removeChild(a);
                  flash("Downloaded!",3000);
                }} style={{width:"100%",padding:"14px",background:"rgba(88,166,255,0.1)",border:"1px solid rgba(88,166,255,0.4)",borderRadius:8,color:"#58a6ff",fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
                  Download Backup
                </button>
                <button onClick={async function(){
                  flash("Generating sync code...",0);
                  try {
                    var r=await fetch("https://api.jsonbin.io/v3/b",{
                      method:"POST",
                      headers:{"Content-Type":"application/json","X-Bin-Private":"false"},
                      body:JSON.stringify(data)
                    });
                    var d=await r.json();
                    var binId=d.metadata&&d.metadata.id;
                    if (!binId) throw new Error("No bin ID returned");
                    var code=binId.slice(-6).toUpperCase();
                    localStorage.setItem("icap_synccode",binId);
                    setSyncCode(code);
                    flash("Sync code ready!",0);
                  } catch(e) { flash("Failed: "+e.message,5000); }
                }} style={{width:"100%",padding:"14px",background:"rgba(88,166,255,0.1)",border:"1px solid rgba(88,166,255,0.4)",borderRadius:8,color:"#58a6ff",fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
                  Generate Sync Code
                </button>
                {syncCode && (
                  <div style={{background:"#0d1117",border:"2px solid #58a6ff",borderRadius:10,padding:"16px",textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#8b949e",marginBottom:6}}>Type this code on your other device:</div>
                    <div style={{fontSize:36,fontWeight:700,color:"#58a6ff",letterSpacing:8,fontFamily:"monospace"}}>{syncCode}</div>
                    <div style={{fontSize:11,color:"#8b949e",marginTop:6}}>Code expires in 24 hours</div>
                  </div>
                )}
                <button onClick={function(){setShowImport(true);}} style={{width:"100%",padding:"14px",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.4)",borderRadius:8,color:"#22c55e",fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
                  Load with Sync Code
                </button>
              </div>
            </div>
            <SyncPanel onPush={pushSheet} onPull={pullSheet} />
            <div style={{background:"#161b22",border:"1px solid #30363d",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:12,color:"#8b949e",fontWeight:600,marginBottom:10}}>Example commands</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {["What are my high priority open tasks?","What tasks are overdue?","Add task: Call Stacey Shea high priority BD due Friday","What taxes are unpaid?","Show me open House Build tasks"].map(function(s){
                  return <button key={s} onClick={function(){setAiInput(s);}} style={{padding:"4px 10px",background:"rgba(88,166,255,0.1)",border:"1px solid rgba(88,166,255,0.25)",borderRadius:20,color:"#58a6ff",fontSize:11,cursor:"pointer"}}>{s}</button>;
                })}
              </div>
            </div>
            <Btn onClick={runGmail} disabled={gmailLoading} style={{width:"100%",padding:"10px",background:"#161b22",border:"1px solid #30363d",color:gmailLoading?"#8b949e":"#c9d1d9",marginBottom:14,display:"block"}}>
              {gmailLoading?"Scanning Gmail...":"Pull New Tasks from Gmail"}
            </Btn>
            <div style={{minHeight:200,maxHeight:400,overflowY:"auto",marginBottom:12,display:"flex",flexDirection:"column",gap:8}}>
              {aiHistory.length===0 && <Empty msg="Ask me anything about your IC-CAP data." />}
              {aiHistory.map(function(m,i){
                return (
                  <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                    <div style={{maxWidth:"82%",padding:"9px 13px",borderRadius:10,background:m.role==="user"?"#1f6feb":"#21262d",border:m.role==="assistant"?"1px solid #30363d":"none",fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",color:m.role==="user"?"#f0f6fc":"#c9d1d9"}}>{m.text}</div>
                  </div>
                );
              })}
              {aiLoading && <div style={{display:"flex"}}><div style={{padding:"9px 13px",borderRadius:10,background:"#21262d",border:"1px solid #30363d",fontSize:13,color:"#8b949e"}}>Thinking...</div></div>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={aiInput} onChange={function(e){setAiInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey)runAI();}} placeholder="Ask about your data..." style={{flex:1,background:"#21262d",border:"1px solid #30363d",borderRadius:8,padding:"9px 13px",color:"#c9d1d9",fontSize:13,outline:"none"}} />
              <Btn onClick={runAI} disabled={aiLoading||!aiInput.trim()} style={{background:"#238636",border:"1px solid #2ea043",color:"#f0f6fc",fontWeight:600,opacity:(aiLoading||!aiInput.trim())?0.5:1}}>Send</Btn>
            </div>
          </div>
        )}

      </div>

      {showImport && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
          <div style={{background:"#161b22",borderRadius:12,padding:22,width:"100%",maxWidth:520,border:"1px solid #30363d",display:"flex",flexDirection:"column",gap:12,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontWeight:600,fontSize:15,color:"#f0f6fc"}}>Load with Sync Code</div>
            <div style={{fontSize:12,color:"#8b949e",lineHeight:1.8}}>
              1. On your laptop click <b style={{color:"#58a6ff"}}>Generate Sync Code</b><br/>
              2. A 6-character code will appear on screen<br/>
              3. Type that code below on your phone
            </div>
            <input
              value={importText}
              onChange={function(e){setImportText(e.target.value.toUpperCase().replace(/[^A-F0-9]/g,"").slice(0,6));}}
              placeholder="Enter 6-char code e.g. A3F9B2"
              maxLength={6}
              style={{width:"100%",background:"#0d1117",border:"2px solid #58a6ff",borderRadius:7,padding:"16px",color:"#58a6ff",fontSize:28,fontWeight:700,outline:"none",boxSizing:"border-box",textAlign:"center",letterSpacing:8,fontFamily:"monospace"}}
            />
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){setShowImport(false);setImportText("");}} style={{flex:1,padding:"14px",borderRadius:8,border:"1px solid #30363d",background:"#21262d",color:"#c9d1d9",cursor:"pointer",fontSize:14,fontWeight:500}}>Cancel</button>
              <button onClick={async function(){
                if (importText.length!==6) { flash("Enter the full 6-character code",3000); return; }
                flash("Loading...",0);
                try {
                  var stored=localStorage.getItem("icap_synccode")||"";
                  var binId=stored.slice(-6).toUpperCase()===importText ? stored : null;
                  if (!binId) {
                    var search=await fetch("https://api.jsonbin.io/v3/b?meta=false");
                    var bins=await search.json();
                    if (Array.isArray(bins)) {
                      for (var i=0;i<bins.length;i++) {
                        if (bins[i].id&&bins[i].id.slice(-6).toUpperCase()===importText) { binId=bins[i].id; break; }
                      }
                    }
                  }
                  if (!binId) {
                    var r2=await fetch("https://api.jsonbin.io/v3/b/latest?meta=false");
                    flash("Code not found locally - try downloading backup instead",5000);
                    return;
                  }
                  var r=await fetch("https://api.jsonbin.io/v3/b/"+binId+"/latest");
                  var d=await r.json();
                  var imported=d.record||d;
                  if (!imported.tasks) { flash("Invalid data in sync code",4000); return; }
                  setData(imported);
                  localStorage.setItem("icap_v4",JSON.stringify(imported));
                  flash("Loaded! Tasks:"+imported.tasks.length,4000);
                  setShowImport(false);
                  setImportText("");
                } catch(e) { flash("Load failed: "+e.message,5000); }
              }} disabled={importText.length!==6} style={{flex:1,padding:"14px",borderRadius:8,border:"1px solid #2ea043",background:importText.length===6?"#238636":"#21262d",color:importText.length===6?"#f0f6fc":"#8b949e",cursor:importText.length===6?"pointer":"default",fontSize:14,fontWeight:700}}>
                Load Data
              </button>
            </div>
          </div>
        </div>
      )}
      {showExportText && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
          <div style={{background:"#161b22",borderRadius:12,padding:22,width:"100%",maxWidth:520,border:"1px solid #30363d",display:"flex",flexDirection:"column",gap:12,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontWeight:600,fontSize:15,color:"#f0f6fc"}}>Copy Your Data</div>
            <div style={{fontSize:12,color:"#8b949e"}}>Select all the text below and copy it, then send it to your other device.</div>
            <textarea readOnly value={JSON.stringify(data)} rows={8} style={{width:"100%",background:"#0d1117",border:"1px solid #30363d",borderRadius:7,padding:"10px",color:"#c9d1d9",fontSize:11,outline:"none",resize:"none",boxSizing:"border-box"}} onClick={function(e){e.target.select();}} />
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){setShowExportText(false);}} style={{flex:1,padding:"14px",borderRadius:8,border:"1px solid #30363d",background:"#21262d",color:"#c9d1d9",cursor:"pointer",fontSize:14}}>Close</button>
              <button onClick={function(){
                var ta=document.querySelector("textarea[readonly]");
                if(ta){ta.select();document.execCommand("copy");flash("Copied!",2000);}
              }} style={{flex:1,padding:"14px",borderRadius:8,border:"1px solid #388bfd",background:"#1f6feb",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700}}>Select All + Copy</button>
            </div>
          </div>
        </div>
      )}
      {showAdd && tab==="tasks" && <TaskModal onSave={async function(d){var newId=Math.max.apply(null,tasks.map(function(t){return parseInt(t.id)||0;}).concat([0]))+1;await save({tasks:tasks.concat([Object.assign({id:newId},d)])});setShowAdd(false);}} onClose={function(){setShowAdd(false);}} />}
      {showAdd && tab==="calendar" && <EventModal onSave={async function(d){var newId=Math.max.apply(null,events.map(function(e){return parseInt(e.id)||0;}).concat([0]))+1;await save({events:events.concat([Object.assign({id:newId},d)])});setShowAdd(false);}} onClose={function(){setShowAdd(false);}} />}
      {editItem&&editItem.type==="task" && <TaskModal task={editItem.item} onSave={async function(d){await save({tasks:tasks.map(function(t){return t.id===editItem.item.id?Object.assign({},t,d):t;})});setEditItem(null);}} onDelete={async function(){await save({tasks:tasks.filter(function(t){return t.id!==editItem.item.id;})});setEditItem(null);}} onClose={function(){setEditItem(null);}} />}
      {editItem&&editItem.type==="member" && <MemberModal member={editItem.item} onClose={function(){setEditItem(null);}} />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
